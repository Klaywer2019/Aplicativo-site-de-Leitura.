<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reino Celeste - v2.0</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        /* 2. ESTÉTICA DO REINO (CSS) */
        :root {
            --ouro: #d4af37;
            --fundo: #0c0c0c;
            --madeira: #1a140d;
            --perigo: #c0392b;
        }

        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--fundo); 
            color: white; 
            font-family: 'Segoe UI', serif; 
            overflow-x: hidden; 
        }

        /* --- Telas e Containers --- */
        .tela-cheia { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 4000; background: radial-gradient(circle, #1e140d 0%, #0a0a0a 100%);
        }

        .card-auth {
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(10px); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--ouro); 
            text-align: center; 
            width: 90%; max-width: 380px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        /* --- Inputs e Botões --- */
        input {
            width: 100%; padding: 12px; margin-bottom: 12px; 
            background: rgba(0,0,0,0.5); border: 1px solid #3d2b1f; 
            border-radius: 8px; color: var(--ouro); outline: none;
        }

        .btn-principal {
            width: 100%; padding: 14px; background: var(--ouro); 
            color: #1a140d; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-principal:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* --- Estante e Interface --- */
        .nav-topo { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: var(--madeira); 
            border-bottom: 2px solid var(--ouro); position: sticky; top: 0; z-index: 1000; 
        }

        .prateleira-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .prateleira-madeira { border-bottom: 12px solid #3d2b1f; margin-bottom: 30px; }
        
        .item-card { 
            min-width: 260px; background: #1c1c1c; border-radius: 20px; 
            text-align: center; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .destaque-real { 
            border: 2px solid var(--ouro) !important; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            animation: flutuar 3s ease-in-out infinite;
        }

        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- Sidebar --- */
        .sidebar { 
            height: 100%; width: 0; position: fixed; z-index: 3500; top: 0; right: 0; 
            background-color: rgba(26, 20, 13, 0.95); backdrop-filter: blur(10px); 
            overflow-x: hidden; transition: 0.5s; border-left: 5px ridge var(--ouro);
        }

        /* --- Utilitários --- */
        #alerta-celeste {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 5000; width: 85%; max-width: 320px; background: #1a1a1a; 
            border: 2px solid var(--ouro); border-radius: 20px; padding: 25px; text-align: center;
        }

        py-script { display: none; }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <script type="py">
        from pyscript import window

        def validar_escrituras(email, senha, nome=None):
            if "@" not in email: return "E-mail sem o selo '@'!"
            if len(senha) < 4: return "A senha rúnica é muito curta!"
            if nome is not None and len(nome) < 2: return "O nome do mestre é muito breve!"
            return "OK"

        window.validar_python = validar_escrituras
    </script>

    <div id="alerta-celeste">
        <div style="color: var(--ouro); font-weight: bold; margin-bottom: 10px;" id="alerta-titulo">📜 Mensagem</div>
        <div style="color: #ccc; font-size: 0.9rem; margin-bottom: 20px;" id="msg-texto"></div>
        <button class="btn-principal" onclick="fecharAlerta()">Entendido</button>
    </div>

    <div id="sessao-auth" class="tela-cheia">
        
        <div id="bloco-login" class="card-auth">
            <h1 style="color: var(--ouro); margin-bottom: 20px;">🛡️ Reino Celeste</h1>
            <input type="email" id="login-email" placeholder="E-mail do Criador">
            <div style="position: relative;">
                <input type="password" id="login-senha" placeholder="Senha Rúnica">
                <span onclick="toggleSenha('login-senha')" style="position: absolute; right: 12px; top: 10px; cursor: pointer;">👁️</span>
            </div>
            <button class="btn-principal" onclick="entrar()">Entrar no Cofre 🔐</button>
            <p style="font-size: 0.75rem; color: #888; margin-top: 15px;">
                Novo guerreiro? <span style="color: var(--ouro); cursor: pointer; text-decoration: underline;" onclick="alternarTelas('cadastro')">Aliste-se aqui</span>
            </p>
        </div>

        <div id="bloco-cadastro" class="card-auth" style="display: none;">
            <h1 style="color: var(--ouro); margin-bottom: 20px;">🖋️ Alistamento</h1>
            <input type="text" id="cad-nome" placeholder="Nome do Mestre">
            <input type="email" id="cad-email" placeholder="E-mail rúnico">
            <input type="password" id="cad-senha" placeholder="Nova Senha Rúnica">
            <button class="btn-principal" onclick="cadastrar()">Finalizar Registro 📜</button>
            <p style="font-size: 0.75rem; color: #888; margin-top: 15px;">
                Já possui acesso? <span style="color: var(--ouro); cursor: pointer; text-decoration: underline;" onclick="alternarTelas('login')">Voltar ao Portal</span>
            </p>
        </div>
    </div>

    <div id="estante-principal" style="display: none;">
        <div class="nav-topo">
            <button style="background: var(--perigo); color: white; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; cursor: pointer;" onclick="sair()">Sair</button>
            <h3 style="color: var(--ouro);">Celeste App</h3>
            <img src="https://via.placeholder.com/45" class="perfil-foto" onclick="abrirMenu()">
        </div>

        <h3 style="margin: 20px; color: var(--ouro);">📖 Obras Sagradas</h3>
        <div class="prateleira-madeira">
            <div class="prateleira-container">
                <div class="item-card destaque-real">
                    <div class="item-capa" style="background: linear-gradient(135deg, #4B0082, #00FF00); height: 120px;">
                        <span>Celeste Dragon 🔥🐲</span>
                    </div>
                    <div style="padding: 15px;">
                        <a href="celeste.html" class="btn-principal" style="text-decoration: none; display: block;">Ler Obra</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="menuLateral" class="sidebar">
        <div style="padding: 20px;"> 
            <div style="background: rgba(38, 30, 20, 0.7); padding: 15px; border-radius: 12px; border: 1px solid var(--ouro);">
                <h2 id="nome-perfil" style="color: var(--ouro);">Mestre</h2>
                <button class="btn-principal" style="margin-top:20px; background: #3d2b1f; color: var(--ouro);" onclick="fecharMenu()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://SUA-URL-DO-CODESPACES-AQUI-5000.app.github.dev'; // <-- COLOQUE SEU LINK AQUI

        // --- Proteção e Utilidades ---
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && (e.key=='u' || e.key=='i' || e.key=='j'))) return false;
        };

        function toggleSenha(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function alternarTelas(tipo) {
            document.getElementById('bloco-login').style.display = tipo === 'login' ? 'block' : 'none';
            document.getElementById('bloco-cadastro').style.display = tipo === 'cadastro' ? 'block' : 'none';
        }

        function exibirAlerta(msg, titulo = "📜 Mensagem") {
            document.getElementById('alerta-titulo').innerText = titulo;
            document.getElementById('msg-texto').innerText = msg;
            document.getElementById('alerta-celeste').style.display = 'block';
        }

        function fecharAlerta() { document.getElementById('alerta-celeste').style.display = 'none'; }
        function abrirMenu() { document.getElementById("menuLateral").style.width = "280px"; }
        function fecharMenu() { document.getElementById("menuLateral").style.width = "0"; }

        function sair() { localStorage.clear(); location.reload(); }

        // --- Conexão com o Motor (Flask) ---
        async function entrar() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            if(window.validar_python) {
                const check = window.validar_python(email, senha);
                if(check !== "OK") return exibirAlerta(check);
            }

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, senha})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('reinoLogado', 'true');
                    localStorage.setItem('usuarioNome', data.usuario);
                    location.reload();
                } else {
                    exibirAlerta(data.msg);
                }
            } catch(e) { exibirAlerta("Motor Offline! Verifique o terminal."); }
        }

        async function cadastrar() {
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;

            if(window.validar_python) {
                const check = window.validar_python(email, senha, nome);
                if(check !== "OK") return exibirAlerta(check);
            }

            try {
                const res = await fetch(`${API_URL}/cadastro`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nome, email, senha})
                });
                const data = await res.json();
                exibirAlerta(data.msg);
                if(res.ok) alternarTelas('login');
            } catch(e) { exibirAlerta("Erro ao registrar no portal."); }
        }

        window.onload = () => {
            if (localStorage.getItem('reinoLogado') === 'true') {
                document.getElementById('sessao-auth').style.display = 'none';
                document.getElementById('estante-principal').style.display = 'block';
                document.getElementById('nome-perfil').innerText = localStorage.getItem('usuarioNome');
            }
        };
    </script>
</body>
</html>
